<svg xmlns="http://www.w3.org/2000/svg" width="480" height="260" viewBox="0 0 480 260">
<rect width="480" height="260" fill="white"/>
<!-- VCC -->
<text x="190" y="29" text-anchor="middle" font-family="monospace" font-size="11" fill="#111">VCC</text>
<line x1="168" y1="33" x2="212" y2="33" stroke="#111" stroke-width="2"/>
<line x1="190" y1="33" x2="190" y2="60" stroke="#111" stroke-width="1.5"/>
<!-- PMOS switch -->
<rect x="152" y="60" width="76" height="36" fill="#f0f0f0" stroke="#111" stroke-width="1.5" rx="2"/>
<text x="190" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">PMOS</text>
<!-- wire to output node -->
<line x1="190" y1="96" x2="190" y2="119" stroke="#111" stroke-width="1.5"/>
<!-- output node -->
<circle cx="190" cy="121" r="3.5" fill="#111"/>
<!-- output wire -->
<line x1="190" y1="121" x2="390" y2="121" stroke="#111" stroke-width="1.5"/>
<!-- GPIO Pin box -->
<rect x="390" y="113" width="16" height="16" fill="white" stroke="#111" stroke-width="1.5"/>
<text x="412" y="125" font-family="monospace" font-size="11" fill="#111">GPIO Pin</text>
<!-- wire to NMOS -->
<line x1="190" y1="121" x2="190" y2="146" stroke="#111" stroke-width="1.5"/>
<!-- NMOS switch -->
<rect x="152" y="146" width="76" height="36" fill="#f0f0f0" stroke="#111" stroke-width="1.5" rx="2"/>
<text x="190" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">NMOS</text>
<!-- wire to GND -->
<line x1="190" y1="182" x2="190" y2="205" stroke="#111" stroke-width="1.5"/>
<!-- GND symbol -->
<line x1="168" y1="205" x2="212" y2="205" stroke="#111" stroke-width="2"/>
<line x1="175" y1="211" x2="205" y2="211" stroke="#111" stroke-width="2"/>
<line x1="182" y1="217" x2="198" y2="217" stroke="#111" stroke-width="2"/>
<text x="190" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#111">GND</text>
<!-- description -->
<text x="240" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Drives HIGH (PMOS on, NMOS off) and LOW (PMOS off, NMOS on)</text>
</svg>