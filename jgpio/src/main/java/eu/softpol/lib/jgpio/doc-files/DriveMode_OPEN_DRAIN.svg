<svg xmlns="http://www.w3.org/2000/svg" width="480" height="260" viewBox="0 0 480 260">
<rect width="480" height="260" fill="white"/>
<!-- floating top indicator -->
<circle cx="190" cy="52" r="5" fill="none" stroke="#888" stroke-width="1.5"/>
<text x="205" y="56" font-family="monospace" font-size="9" fill="#888">float (no pull to VCC)</text>
<!-- dashed line from float to output node -->
<line x1="190" y1="57" x2="190" y2="98" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
<!-- output node -->
<circle cx="190" cy="100" r="3.5" fill="#111"/>
<!-- output wire -->
<line x1="190" y1="100" x2="390" y2="100" stroke="#111" stroke-width="1.5"/>
<!-- GPIO Pin box -->
<rect x="390" y="92" width="16" height="16" fill="white" stroke="#111" stroke-width="1.5"/>
<text x="412" y="104" font-family="monospace" font-size="11" fill="#111">GPIO Pin</text>
<!-- wire to NMOS -->
<line x1="190" y1="100" x2="190" y2="130" stroke="#111" stroke-width="1.5"/>
<!-- NMOS switch -->
<rect x="152" y="130" width="76" height="36" fill="#f0f0f0" stroke="#111" stroke-width="1.5" rx="2"/>
<text x="190" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">NMOS</text>
<!-- wire to GND -->
<line x1="190" y1="166" x2="190" y2="195" stroke="#111" stroke-width="1.5"/>
<!-- GND symbol -->
<line x1="168" y1="195" x2="212" y2="195" stroke="#111" stroke-width="2"/>
<line x1="175" y1="201" x2="205" y2="201" stroke="#111" stroke-width="2"/>
<line x1="182" y1="207" x2="198" y2="207" stroke="#111" stroke-width="2"/>
<text x="190" y="222" text-anchor="middle" font-family="monospace" font-size="11" fill="#111">GND</text>
<!-- description -->
<text x="240" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Drives LOW (NMOS on); output floats HIGH â€” requires external pull-up</text>
</svg>