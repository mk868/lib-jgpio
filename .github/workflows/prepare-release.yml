name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set release version
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          mvn -B -ntp -f jgpio/pom.xml versions:set -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false
          mvn -B -ntp -f jgpio-it/pom.xml versions:set -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false
          mvn -B -ntp -f examples/pom.xml versions:set-property -Dproperty=jgpio.version -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false
          sed -i "/<version>/s/>.*</>$RELEASE_VERSION</" README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          title: 'Prepare release ${{ github.event.inputs.version }}'
          body: 'Automated preparation of ${{ github.event.inputs.version }} release'
          commit-message: 'Set version to ${{ github.event.inputs.version }}'
          branch: 'release-${{ github.event.inputs.version }}'
